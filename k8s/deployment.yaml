apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-binding-preview
  labels:
    app: service-binding-preview
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-binding-preview
  template:
    metadata:
      labels:
        app: service-binding-preview
        version: v1
    spec:
      containers:
      - name: app
        image: ghcr.io/YOUR_USERNAME/service-binding-preview:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: "production"
        - name: APP_NAME
          value: "Service Binding Preview"
        - name: ENVIRONMENT
          value: "production"
        - name: VERSION
          value: "1.0.0"
        # Service binding environment variables will be injected here
        # by Kyma's service binding operator
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
---
apiVersion: v1
kind: Service
metadata:
  name: service-binding-preview
  labels:
    app: service-binding-preview
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: service-binding-preview
