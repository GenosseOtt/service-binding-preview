<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workload Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main">
        <h1 class="hello">Hello...</h1>
        <p class="description">I am your workload application.</p>

        <div class="env-box">
            <div class="env-line">APP_NAME=<span id="app-name"></span></div>
            <div class="env-line">ENVIRONMENT=<span id="environment"></span></div>
            <div class="env-line">VERSION=<span id="version"></span></div>
            <div class="env-line">PORT=<span id="port"></span></div>
            <div class="env-line">API_KEY=<span id="api-key"></span></div>
            <div class="env-line">DATABASE_URL=<span id="database-url"></span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
